<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work Café PWA | Gestión de Pedidos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Merriweather:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
    .nav-active { color: #dc2626; border-right: 4px solid #dc2626; background: #fef2f2; }
    @media (max-width: 768px) { .nav-active { border-right: none; border-top: 4px solid #dc2626; } }
    .glass-card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); padding: 1.5rem; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .status-badge { padding: 2px 8px; border-radius: 12px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
    .status-pendiente { background: #fef3c7; color: #92400e; }
    .status-entregado { background: #dcfce7; color: #166534; }
  </style>
</head>
<body class="overflow-hidden h-screen flex flex-col md:flex-row text-gray-800">

  <aside class="hidden md:flex flex-col w-64 bg-white border-r border-gray-200 z-20 shadow-lg">
    <div class="p-6 border-b border-gray-100"><h1 class="text-2xl font-bold text-red-700">Work Café</h1></div>
    <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
      <button onclick="showSection('landing')" class="nav-item nav-active w-full flex items-center p-3 rounded-xl font-medium" id="btn-landing"><span class="material-symbols-rounded mr-3">home</span> Inicio</button>
      <button onclick="showSection('sensorial')" class="nav-item w-full flex items-center p-3 rounded-xl font-medium" id="btn-sensorial"><span class="material-symbols-rounded mr-3">local_cafe</span> Sensorial</button>
      <button onclick="showSection('tostado')" class="nav-item w-full flex items-center p-3 rounded-xl font-medium" id="btn-tostado"><span class="material-symbols-rounded mr-3">show_chart</span> Tueste</button>
      <button onclick="showSection('historia')" class="nav-item w-full flex items-center p-3 rounded-xl font-medium" id="btn-historia"><span class="material-symbols-rounded mr-3">menu_book</span> Historia</button>
      <hr class="my-4">
      <button onclick="showSection('pedidos')" class="nav-item w-full flex items-center p-3 rounded-xl font-bold" id="btn-pedidos"><span class="material-symbols-rounded mr-3 text-red-600">shopping_cart</span> Pedidos</button>
    </nav>
  </aside>

  <main class="flex-1 flex flex-col h-full overflow-y-auto bg-gray-50">
    <header class="h-16 bg-white/80 backdrop-blur-md border-b flex items-center justify-between px-6 sticky top-0 z-10">
      <h2 id="section-title" class="text-lg font-bold">Resumen</h2>
      <div id="status-badge" class="px-3 py-1 bg-green-100 text-green-700 text-xs rounded-full flex items-center font-semibold">
        <span class="w-2 h-2 bg-green-500 rounded-full mr-2 animate-pulse"></span> Sincronizado
      </div>
    </header>

    <div id="content-area" class="p-4 md:p-8 space-y-6 max-w-5xl mx-auto w-full pb-24">
      
      <section id="section-landing" class="section-transition">
        <div class="p-8 bg-red-700 rounded-[2rem] text-white shadow-xl">
          <h2 class="text-3xl font-bold mb-2" id="ui-lote">Cargando...</h2>
          <div class="mt-4 flex items-baseline"><span class="text-6xl font-bold" id="ui-sca">--</span><span class="ml-2 text-xl opacity-80">Pts SCA</span></div>
        </div>
      </section>

      <section id="section-sensorial" class="hidden section-transition"><div class="glass-card"><canvas id="radarChart"></canvas></div></section>
      <section id="section-tostado" class="hidden section-transition"><div class="glass-card"><canvas id="roastChart"></canvas></div></section>
      <section id="section-historia" class="hidden section-transition"><div class="glass-card" id="ui-historia-texto">...</div></section>

      <section id="section-pedidos" class="hidden section-transition space-y-6">
        
        <div id="pedidos-auth" class="glass-card max-w-md mx-auto text-center">
          <h3 class="font-bold text-xl mb-4">Acceso a Pedidos</h3>
          <select id="auth-sucursal" class="w-full p-3 mb-3 bg-gray-50 border rounded-xl">
            <option value="Admin">Administrador (Master)</option>
            </select>
          <input type="password" id="auth-pin" placeholder="Ingresa PIN" class="w-full p-3 mb-4 bg-gray-50 border rounded-xl text-center">
          <button onclick="loginPedidos()" class="w-full bg-black text-white p-4 rounded-xl font-bold">Entrar</button>
        </div>

        <div id="pedidos-panel" class="hidden space-y-6">
          <div class="flex justify-between items-center">
            <h3 class="text-2xl font-bold" id="panel-welcome">Panel</h3>
            <button onclick="logoutPedidos()" class="text-sm text-red-600 font-bold">Cerrar Sesión</button>
          </div>

          <div class="flex space-x-2 bg-gray-200 p-1 rounded-xl">
            <button onclick="tabPedidos('nuevo')" id="tab-btn-nuevo" class="flex-1 py-2 rounded-lg font-bold bg-white shadow-sm">Nuevo Pedido</button>
            <button onclick="tabPedidos('historial')" id="tab-btn-historial" class="flex-1 py-2 rounded-lg font-bold text-gray-500">Historial</button>
          </div>

          <div id="tab-nuevo" class="glass-card">
            <div class="space-y-4">
              <input type="number" id="order-qty" placeholder="Cantidad de bolsas (1kg)" class="w-full p-4 bg-gray-50 border rounded-xl">
              <button onclick="enviarPedido()" id="btn-send" class="w-full bg-red-600 text-white p-4 rounded-xl font-bold">Confirmar Pedido</button>
            </div>
          </div>

          <div id="tab-historial" class="hidden space-y-4">
            <div id="lista-pedidos" class="space-y-3">
              </div>
          </div>
        </div>
      </section>

    </div>
  </main>

  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzoifrhQsfmpyTM2W-Pvt-4woCnohKsg4MxwfTnZQiHrJFZp8IT95G7YW5RKIpiHxG8Aw/exec'; 
    const MASTER_ADMIN_PIN = "Admin2026";
    let currentUser = null;
    let currentPin = null;

    // --- NAVEGACIÓN ---
    function showSection(id) {
      document.querySelectorAll('.section-transition').forEach(s => s.classList.add('hidden'));
      document.getElementById('section-' + id).classList.remove('hidden');
    }

    function tabPedidos(tab) {
      document.getElementById('tab-nuevo').classList.toggle('hidden', tab !== 'nuevo');
      document.getElementById('tab-historial').classList.toggle('hidden', tab !== 'historial');
      if(tab === 'historial') cargarHistorial();
    }

    // --- LÓGICA DE AUTH ---
    function loginPedidos() {
      const suc = document.getElementById('auth-sucursal').value;
      const pin = document.getElementById('auth-pin').value;
      
      // Validación básica
      if(pin === MASTER_ADMIN_PIN || pin === "2026") {
        currentUser = suc;
        currentPin = pin;
        document.getElementById('pedidos-auth').classList.add('hidden');
        document.getElementById('pedidos-panel').classList.remove('hidden');
        document.getElementById('panel-welcome').innerText = (pin === MASTER_ADMIN_PIN) ? "Panel Admin" : "Sucursal: " + suc;
      } else {
        alert("PIN Incorrecto");
      }
    }

    function logoutPedidos() {
      currentUser = null; currentPin = null;
      document.getElementById('pedidos-auth').classList.remove('hidden');
      document.getElementById('pedidos-panel').classList.add('hidden');
    }

    // --- OBTENER HISTORIAL ---
    async function cargarHistorial() {
      const container = document.getElementById('lista-pedidos');
      container.innerHTML = '<p class="text-center animate-pulse">Cargando historial...</p>';
      
      try {
        const url = `${APPS_SCRIPT_URL}?action=getOrders&sucursal=${currentUser}&pin=${currentPin}`;
        const res = await fetch(url);
        const data = await res.json();
        
        container.innerHTML = '';
        data.forEach(p => {
          const card = document.createElement('div');
          card.className = 'glass-card border-l-4 ' + (p.estado === 'Pendiente' ? 'border-yellow-400' : 'border-green-500');
          card.innerHTML = `
            <div class="flex justify-between items-start">
              <div>
                <p class="text-[10px] text-gray-400 font-bold uppercase">${p.fecha}</p>
                <h4 class="font-bold text-gray-800">${p.sucursal}</h4>
                <p class="text-sm text-gray-600">${p.cantidad} Bolsas - Lote: ${p.lote}</p>
              </div>
              <span class="status-badge ${p.estado === 'Pendiente' ? 'status-pendiente' : 'status-entregado'}">${p.estado}</span>
            </div>
          `;
          container.appendChild(card);
        });
      } catch(e) { container.innerHTML = 'Error al cargar'; }
    }

    // --- ENVIAR PEDIDO ---
    async function enviarPedido() {
      const qty = document.getElementById('order-qty').value;
      if(!qty) return alert("Ingresa cantidad");
      
      const btn = document.getElementById('btn-send');
      btn.disabled = true; btn.innerText = "Enviando...";

      const pedido = {
        sucursal: currentUser,
        cantidad: qty,
        pin: currentPin,
        lote: document.getElementById('ui-lote').innerText
      };

      await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(pedido) });
      alert("¡Pedido enviado con éxito!");
      document.getElementById('order-qty').value = '';
      tabPedidos('historial');
      btn.disabled = false; btn.innerText = "Confirmar Pedido";
    }

    // --- INICIO ---
    window.onload = () => {
      // (Aquí va la misma lógica de cargarSucursales() e initApp() de la V2 anterior)
    };
  </script>
</body>
</html>
